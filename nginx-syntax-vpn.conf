# /etc/nginx/sites-available/syntax-vpn.tech
# Nginx конфиг для subscription-сервера

server {
    listen 80;
    server_name syntax-vpn.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name syntax-vpn.tech;

    # SSL сертификаты (получи через certbot)
    ssl_certificate /etc/letsencrypt/live/syntax-vpn.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/syntax-vpn.tech/privkey.pem;

    # Subscription server
    location /sub/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8080;
    }
}
